<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Submitted | Daxos|Capital</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
@import url('https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@300;400;500;700&display=swap');
body { background: #000; color: #fff; font-family: "Roboto Mono", monospace; min-height: 100vh; display: flex; flex-direction: column; }
a { color: #fff; text-decoration: none; }
.nav { display: flex; justify-content: space-between; align-items: center; padding: 28px 48px; border-bottom: 1px solid #1a1a1a; }
.nav-logo { border: 1.5px solid #fff; padding: 8px 20px; font-size: 15px; letter-spacing: 1px; }
.main { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 0 48px; }
.headline { font-size: 32px; letter-spacing: 2px; text-transform: uppercase; line-height: 1.2; }
.divider { width: 48px; height: 1.5px; background: #fff; margin: 24px auto; }
.sub { color: #555; font-size: 13px; letter-spacing: 1px; line-height: 1.8; }
.home-btn { display: inline-block; margin-top: 32px; border: 1.5px solid #fff; padding: 14px 48px; font-size: 11px; letter-spacing: 3px; text-transform: uppercase; }
.home-btn:hover { background: #fff; color: #000; }
.footer { padding: 16px 48px; border-top: 1px solid #1a1a1a; display: flex; justify-content: space-between; font-size: 10px; color: #444; letter-spacing: 1px; }
.footer-links { display: flex; gap: 24px; }
.footer-links a { color: #444; }
</style>
<style>
.daxos-footer { padding: 20px 48px; border-top: 1px solid #1a1a1a; display: flex; justify-content: center; align-items: center; font-size: 13px; color: #444; letter-spacing: 1px; gap: 16px; flex-wrap: wrap; font-family: "Roboto Mono", monospace; background: #000; }
.daxos-footer-links { display: flex; gap: 8px; align-items: center; }
.daxos-footer-links a { color: #555; text-decoration: none; transition: color 0.2s; }
.daxos-footer-links a:hover { color: #fff; }
.daxos-footer-links .dot { color: #333; }
.daxos-footer-copy { color: #333; }
</style>
</head>
<body>
<div class="nav"><a href="/" class="nav-logo">daxos.capital</a></div>
<div class="main">
  <div class="headline">APPLICATION<br>SUBMITTED.</div>
  <div class="divider"></div>
  <p class="sub">Thank you. We review every application<br>and will be in touch if there is a fit.</p>
  <a href="/" class="home-btn">HOME &rarr;</a>
</div>
<div class="footer">
  <div class="footer-links"><a href="/">Home</a><a href="/about/">About Us</a><a href="/about/">About Us</a><a href="/portfolio/">Portfolio</a><a href="/contact/">Contact</a></div>
  <span>&copy; 2026 daxos.capital</span>
</div>
</body>
</html>
