<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
@import url('https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@300;400;500;700&display=swap');
@import url('https://fonts.googleapis.com/css2?family=Source+Code+Pro:wght@400;600;700&display=swap');
@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&display=swap');
html, body { height: 100%; }
body { background: #000; color: #fff; font-family: "Roboto Mono", monospace; display: flex; flex-direction: column; min-height: 100vh; }
a { color: #fff; text-decoration: none; }

.nav { display: flex; justify-content: space-between; align-items: center; padding: 14px 48px; border-bottom: 1px solid #1a1a1a; }
.nav-logo { border: 0.8px solid #fff; padding: 6px 12px; font-size: 17px; letter-spacing: 1px; }
.nav-burger { display: flex; flex-direction: column; gap: 5px; cursor: pointer; padding: 6px; position: relative; width: 36px; height: 32px; box-sizing: border-box; align-items: center; justify-content: center; }
.nav-burger div { width: 24px; height: 1.5px; background: #fff; transition: transform 0.35s cubic-bezier(.7,0,.3,1), opacity 0.2s ease; transform-origin: center; position: absolute; }
.nav-burger div:nth-child(1) { transform: translateY(-7px); }
.nav-burger div:nth-child(2) { transform: translateY(0); }
.nav-burger div:nth-child(3) { transform: translateY(7px); }
.nav-burger.open div:nth-child(1) { transform: translateY(0) rotate(45deg); }
.nav-burger.open div:nth-child(2) { opacity: 0; transform: translateX(-8px); }
.nav-burger.open div:nth-child(3) { transform: translateY(0) rotate(-45deg); }

.nav-menu { display: none; position: fixed; inset: 0; z-index: 100; flex-direction: column; align-items: center; justify-content: center; background: radial-gradient(ellipse at center, #050505 0%, #000 70%); }
.nav-menu.open { display: flex; }
.nav-menu a { position: relative; display: flex; align-items: center; gap: 18px; padding: 12px 0; font-size: 18px; letter-spacing: 2px; text-transform: uppercase; color: #888; font-family: "Source Code Pro", monospace; font-weight: 500; text-decoration: none; transition: color 0.2s ease; }
.nav-menu a:hover { color: #fff; }
.nav-menu a:hover .num { color: #4466ff; opacity: 1; }
.nav-menu a:hover .lbl::after, .nav-menu a.active .lbl::after { width: 12px; }
.nav-menu a.active { color: #fff; }
.nav-menu a.active .num { color: #4466ff; opacity: 1; }
.nav-menu a .num { font-size: 11px; color: #444; font-family: "Source Code Pro", monospace; font-weight: 400; letter-spacing: 1px; opacity: 0.6; transition: opacity 0.2s, color 0.2s; }
.nav-menu a .lbl { position: relative; }
.nav-menu a .lbl::after { content: ""; position: absolute; right: -14px; top: 50%; width: 0; height: 1px; background: #4466ff; transition: width 0.25s ease; }
.nav-close { position: absolute; top: 16px; right: 32px; font-size: 11px; letter-spacing: 2px; font-family: "Source Code Pro", monospace; cursor: pointer; color: #555; transition: color 0.25s ease; display: inline-flex; align-items: center; gap: 8px; padding: 6px 10px; }
.nav-close .glyph { display: inline-block; transition: transform 0.4s cubic-bezier(.7,0,.3,1); }
.nav-close:hover { color: #fff; }
.nav-close:hover .glyph { transform: rotate(90deg); }

.main { flex: 1; padding: 48px 48px 80px; max-width: 900px; }
.page-marker { font-family: "Source Code Pro", monospace; font-size: 11px; letter-spacing: 3px; color: #555; margin-bottom: 14px; }
.page-marker .num { color: #4466ff; }
.page-marker .sep { color: #2a2a2a; margin: 0 6px; }
.page-title { font-family: "Source Code Pro", monospace; font-size: 42px; font-weight: 600; letter-spacing: 2px; margin-bottom: 14px; }
.title-line { width: 48px; height: 1px; background: #4466ff; margin-bottom: 48px;  transform-origin: left center; }
@keyframes markerIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }
@keyframes titleIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
@keyframes lineIn { from { transform: scaleX(0); } to { transform: scaleX(1); } }

.typed-paragraph { font-size: 18px; color: #d8d8d8; line-height: 1.9; letter-spacing: 0; margin-bottom: 22px; font-family: "JetBrains Mono", monospace; font-weight: 400; }
.typed-paragraph .word { opacity: 0; display: inline; transition: opacity 0.3s ease; }
.typed-paragraph .word.visible { opacity: 1; }
.typed-cursor { display: inline-block; width: 2px; height: 1.1em; background: #4466ff; vertical-align: text-bottom; animation: blink 1s infinite; margin-left: 2px; }
@keyframes blink { 0%,100% { opacity: 1; } 50% { opacity: 0; } }

.daxos-footer { padding: 22px 48px; border-top: 1px solid #141414; display: flex; justify-content: center; align-items: center; font-size: 12px; color: #444; letter-spacing: 1.5px; gap: 16px; flex-wrap: wrap; background: #000; font-family: "Source Code Pro", monospace; }
.daxos-footer-links { display: flex; gap: 10px; align-items: center; }
.daxos-footer-links a { color: #666; text-decoration: none; position: relative; padding: 4px 2px; transition: color 0.25s ease; }
.daxos-footer-links a::after { content: ""; position: absolute; left: 2px; right: 2px; bottom: 0; height: 1px; background: #4466ff; transform: scaleX(0); transform-origin: left center; transition: transform 0.3s ease; }
.daxos-footer-links a:hover { color: #fff; }
.daxos-footer-links a:hover::after { transform: scaleX(1); }
.daxos-footer-links .dot { color: #2a2a2a; }
.daxos-footer-copy { color: #333; letter-spacing: 1px; }

@media (max-width: 768px) {
  .nav { padding: 8px 20px; }
  .nav-close { top: 16px; right: 20px; }
  .nav-logo { font-size: 13px; padding: 6px 16px; }
  .main { padding: 40px 24px; }
  .page-title { font-size: 28px; }
  .page-marker { font-size: 10px; letter-spacing: 2px; }
  .typed-paragraph { font-size: 15px; line-height: 1.85; }
  .daxos-footer { padding: 16px 24px; }
  .nav-burger { width: 44px; height: 44px; }
}
</style>

<style id="daxos-page-transition">
body.daxos-leaving { opacity: 0 !important; transition: opacity 0.22s ease; }
</style>
</head>
<body>

<div class="nav">

    <div></div><div></div><div></div>
  </div>
</div>
<div class="nav-menu">
  <div class="nav-close" onclick="this.parentElement.classList.remove('open');document.querySelector('.nav-burger').classList.remove('open')"><svg class="glyph" width="14" height="14" viewBox="0 0 14 14" fill="none" xmlns="http://www.w3.org/2000/svg"><line x1="1" y1="1" x2="13" y2="13" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><line x1="13" y1="1" x2="1" y2="13" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg><span>ESC</span></div>
  <a href='/'><span class="num">01</span><span class="lbl">Home</span></a>

</div>

<div class="main">
  <div class="page-marker"><span class="num">04</span><span class="sep">/</span>ABOUT</div>
  <div class="page-title">ABOUT US</div>
  <div class="title-line"></div>
  <div class="typed-paragraph" id="p0"></div>
  <div class="typed-paragraph" id="p1"></div>
  <div class="typed-paragraph" id="p2"></div>
  <div class="typed-paragraph" id="p3"></div>
</div>

<div class="daxos-footer">
  <div class="daxos-footer-links">
    <a href='/'>Home</a><span class="dot">&middot;</span>
    <a href='/portfolio/'>Portfolio</a><span class="dot">&middot;</span>
    <a href='/contact/'>Contact</a><span class="dot">&middot;</span>
    <a href='/about/'>About Us</a>
  </div>
  <span class="daxos-footer-copy">&copy; 2026 daxos.capital</span>
</div>

<script>
(function() {
  var paragraphs = [
    { id: 'p0', text: "We\u2019re crypto natives with roots in trading, finance, tech, and poker." },
    { id: 'p1', text: 'Daxos Capital was founded sourcing investments in the digital asset space. Now we are industry agnostic.' },
    { id: 'p2', text: "We don\u2019t have LPs. We invest our money." },
    { id: 'p3', text: 'We focus on infrastructure: exchanges, marketplaces, and the foundational platforms powering how value moves. We avoid derivatives and copycats.' }
  ];

  var wordDelay = 80;
  var paragraphGap = 1200;

  function typeParagraph(paraObj, callback) {
    var el = document.getElementById(paraObj.id);
    var words = paraObj.text.split(' ');
    
    // Pre-render all words as hidden spans
    el.innerHTML = words.map(function(w, i) {
      return '<span class="word" data-i="' + i + '">' + w + ' </span>';
    }).join('');

    var cursor = document.createElement('span');
    cursor.className = 'typed-cursor';

    var i = 0;
    function showNext() {
      if (i >= words.length) {
        if (cursor.parentNode) cursor.parentNode.removeChild(cursor);
        if (callback) setTimeout(callback, paragraphGap);
        return;
      }
      var span = el.querySelector('[data-i="' + i + '"]');
      if (span) {
        span.classList.add('visible');
        // Move cursor to immediately after this word
        span.parentNode.insertBefore(cursor, span.nextSibling);
      }
      i++;
      setTimeout(showNext, wordDelay);
    }
    showNext();
  }

  // Chain paragraphs: type p1, wait, type p2, wait, type p3
  setTimeout(function() {
    typeParagraph(paragraphs[0], function() {
      typeParagraph(paragraphs[1], function() {
        typeParagraph(paragraphs[2], function() {
          typeParagraph(paragraphs[3], function() {});
        });
      });
    });
  }, 600);
})();
</script>


<script id="daxos-page-transition-js">
(function() {
  // Fade out before navigating to internal pages
  document.addEventListener('click', function(e) {
    var a = e.target.closest('a');
    if (!a) return;
    var href = a.getAttribute('href');
    if (!href) return;
    // Skip external, anchors, mailto, tel, target=_blank, modifier keys
    if (href.startsWith('http') && !href.includes('daxos.capital')) return;
    if (href.startsWith('#') || href.startsWith('mailto:') || href.startsWith('tel:') || href === '') return;
    if (a.target === '_blank') return;
    if (e.metaKey || e.ctrlKey || e.shiftKey) return;
    // Only intercept .html links
    if (!/\.html(\?|#|$)/.test(href) && !href.endsWith('/')) return;
    e.preventDefault();
    document.body.classList.add('daxos-leaving');
    setTimeout(function() { window.location.href = href; }, 220);
  });
})();
</script>
