* { box-sizing: border-box; margin: 0; padding: 0; }
@import url('https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@300;400;500;700&display=swap');
@import url('https://fonts.googleapis.com/css2?family=Source+Code+Pro:wght@400;600;700&display=swap');
body { background: #000; color: #fff; font-family: "Roboto Mono", monospace; min-height: 100vh; display: flex; flex-direction: column; }
a { color: #fff; text-decoration: none; }

.nav { display: flex; justify-content: space-between; align-items: center; padding: 14px 48px; border-bottom: 1px solid #1a1a1a; }
.nav-logo { border: 0.8px solid #fff; padding: 6px 12px; font-size: 17px; letter-spacing: 1px; }
.nav-burger { display: flex; flex-direction: column; gap: 5px; cursor: pointer; padding: 6px; position: relative; width: 36px; height: 32px; box-sizing: border-box; align-items: center; justify-content: center; }
.nav-burger div { width: 24px; height: 1.5px; background: #fff; transition: transform 0.35s cubic-bezier(.7,0,.3,1), opacity 0.2s ease; transform-origin: center; position: absolute; }
.nav-burger div:nth-child(1) { transform: translateY(-7px); }
.nav-burger div:nth-child(2) { transform: translateY(0); }
.nav-burger div:nth-child(3) { transform: translateY(7px); }
.nav-burger.open div:nth-child(1) { transform: translateY(0) rotate(45deg); }
.nav-burger.open div:nth-child(2) { opacity: 0; transform: translateX(-8px); }
.nav-burger.open div:nth-child(3) { transform: translateY(0) rotate(-45deg); }
.nav-menu { display: none; position: fixed; inset: 0; z-index: 100; flex-direction: column; align-items: center; justify-content: center; background: radial-gradient(ellipse at center, #050505 0%, #000 70%); }
.nav-menu.open { display: flex; }
.nav-menu a { position: relative; display: flex; align-items: center; gap: 18px; padding: 12px 0; font-size: 18px; letter-spacing: 2px; text-transform: uppercase; color: #888; font-family: "Source Code Pro", monospace; font-weight: 500; text-decoration: none; transition: color 0.2s ease; }
.nav-menu a:hover { color: #fff; }
.nav-menu a:hover .num { color: #4466ff; opacity: 1; }
.nav-menu a:hover .lbl::after, .nav-menu a.active .lbl::after { width: 12px; }
.nav-menu a.active { color: #fff; }
.nav-menu a.active .num { color: #4466ff; opacity: 1; }
.nav-menu a .num { font-size: 11px; color: #444; font-family: "Source Code Pro", monospace; font-weight: 400; letter-spacing: 1px; opacity: 0.6; transition: opacity 0.2s, color 0.2s; }
.nav-menu a .lbl { position: relative; }
.nav-menu a .lbl::after { content: ""; position: absolute; right: -14px; top: 50%; width: 0; height: 1px; background: #4466ff; transition: width 0.25s ease; }
.nav-close { position: absolute; top: 16px; right: 32px; font-size: 11px; letter-spacing: 2px; font-family: "Source Code Pro", monospace; cursor: pointer; color: #555; transition: color 0.25s ease; display: inline-flex; align-items: center; gap: 8px; padding: 6px 10px; }
.nav-close .glyph { display: inline-block; transition: transform 0.4s cubic-bezier(.7,0,.3,1); }
.nav-close:hover { color: #fff; }
.nav-close:hover .glyph { transform: rotate(90deg); }

.main { flex: 1; padding: 48px; }
.page-marker { font-family: "Source Code Pro", monospace; font-size: 11px; letter-spacing: 3px; color: #555; margin-bottom: 14px; opacity: 0; transform: translateY(4px); animation: markerIn 0.5s ease 0.1s forwards; }
.page-marker .num { color: #4466ff; }
.page-marker .sep { color: #2a2a2a; margin: 0 6px; }
.page-title { font-family: "Source Code Pro", monospace; font-size: 42px; font-weight: 600; letter-spacing: 2px; margin-bottom: 14px; opacity: 0; transform: translateY(6px); animation: titleIn 0.6s ease 0.2s forwards; }
.title-line { width: 48px; height: 1px; background: #4466ff; margin-bottom: 48px; transform: scaleX(0); transform-origin: left center; animation: lineIn 0.6s ease 0.5s forwards; }
@keyframes markerIn { to { opacity: 1; transform: translateY(0); } }
@keyframes titleIn { to { opacity: 1; transform: translateY(0); } }
@keyframes lineIn { to { transform: scaleX(1); } }

.portfolio-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; width: 100%; max-width: 1400px; }

.portfolio-item {
  border: 1px solid #1a1a1a;
  padding: 44px 40px;
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 180px;
  transition: border-color 0.4s ease, background 0.4s ease, transform 0.4s ease, box-shadow 0.4s ease;
  cursor: pointer;
  opacity: 0;
  transform: translateX(-30px);
  position: relative;
  overflow: hidden;
}
.portfolio-item.visible {
  opacity: 1;
  transform: translateX(0);
}
/* Corner bracket accents — draw in on hover */
.portfolio-item::before,
.portfolio-item::after {
  content: "";
  position: absolute;
  width: 12px;
  height: 12px;
  border: 1px solid #4466ff;
  opacity: 0;
  transition: opacity 0.3s ease, transform 0.4s cubic-bezier(.7,0,.3,1);
  pointer-events: none;
}
.portfolio-item::before {
  top: 8px; left: 8px;
  border-right: none; border-bottom: none;
  transform: translate(4px, 4px);
}
.portfolio-item::after {
  bottom: 8px; right: 8px;
  border-left: none; border-top: none;
  transform: translate(-4px, -4px);
}
.portfolio-item:hover {
  border-color: #4466ff;
  background: rgba(68, 102, 255, 0.05);
  transform: scale(1.025);
  box-shadow: 0 8px 24px rgba(68, 102, 255, 0.12), 0 0 0 1px rgba(68, 102, 255, 0.15);
}
.portfolio-item:hover::before,
.portfolio-item:hover::after {
  opacity: 1;
  transform: translate(0, 0);
}
.portfolio-item img {
  max-width: 200px;
  max-height: 70px;
  object-fit: contain;
  filter: brightness(0.7) saturate(0.85);
  transition: filter 0.4s ease, transform 0.4s cubic-bezier(.7,0,.3,1);
  position: relative;
  z-index: 1;
}
.portfolio-item:hover img {
  filter: brightness(1.15) saturate(1);
  transform: scale(1.06) translateY(-8px);
}

/* Hover-revealed company label + external arrow */
.tile-label {
  position: absolute;
  bottom: 14px;
  left: 0;
  right: 0;
  text-align: center;
  font-family: "Source Code Pro", monospace;
  font-size: 10px;
  letter-spacing: 2.5px;
  text-transform: uppercase;
  color: #4466ff;
  opacity: 0;
  transform: translateY(6px);
  transition: opacity 0.3s ease, transform 0.35s cubic-bezier(.7,0,.3,1);
  pointer-events: none;
  z-index: 2;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  padding: 0 12px;
}
.portfolio-item:hover .tile-label {
  opacity: 1;
  transform: translateY(0);
}
.tile-label .arrow {
  display: inline-block;
  margin-left: 6px;
  transition: transform 0.3s cubic-bezier(.7,0,.3,1);
}
.portfolio-item:hover .tile-label .arrow {
  transform: translate(2px, -2px);
}

.daxos-footer { padding: 22px 48px; border-top: 1px solid #141414; display: flex; justify-content: center; align-items: center; font-size: 12px; color: #444; letter-spacing: 1.5px; gap: 16px; flex-wrap: wrap; background: #000; font-family: "Source Code Pro", monospace; }
.daxos-footer-links { display: flex; gap: 10px; align-items: center; }
.daxos-footer-links a { color: #666; text-decoration: none; position: relative; padding: 4px 2px; transition: color 0.25s ease; }
.daxos-footer-links a::after { content: ""; position: absolute; left: 2px; right: 2px; bottom: 0; height: 1px; background: #4466ff; transform: scaleX(0); transform-origin: left center; transition: transform 0.3s ease; }
.daxos-footer-links a:hover { color: #fff; }
.daxos-footer-links a:hover::after { transform: scaleX(1); }
.daxos-footer-links .dot { color: #2a2a2a; }

@media (max-width: 768px) {

  }
}

<script>
(function() {
  var items = document.querySelectorAll('.portfolio-item');
  var delay = 150;
  
  // Inject hover labels from img alt text
  items.forEach(function(item) {
    var img = item.querySelector('img');
    if (!img) return;
    var name = img.getAttribute('alt') || '';
    if (!name || item.querySelector('.tile-label')) return;
    var label = document.createElement('span');
    label.className = 'tile-label';
    label.innerHTML = name + ' <span class="arrow">↗</span>';
    item.appendChild(label);
  });
  
  setTimeout(function() {
    items.forEach(function(item, i) {
      setTimeout(function() {
        item.classList.add('visible');
      }, i * delay);
    });
  }, 400);
})();
</script>


<script id="daxos-page-transition-js">
(function() {
  // Fade out before navigating to internal pages
  document.addEventListener('click', function(e) {
    var a = e.target.closest('a');
    if (!a) return;
    var href = a.getAttribute('href');
    if (!href) return;
    // Skip external, anchors, mailto, tel, target=_blank, modifier keys
    if (href.startsWith('http') && !href.includes('daxos.capital')) return;
    if (href.startsWith('#') || href.startsWith('mailto:') || href.startsWith('tel:') || href === '') return;
    if (a.target === '_blank') return;
    if (e.metaKey || e.ctrlKey || e.shiftKey) return;
    // Only intercept .html links
    if (!/\.html(\?|#|$)/.test(href) && !href.endsWith('/')) return;
    e.preventDefault();
    document.body.classList.add('daxos-leaving');
    setTimeout(function() { window.location.href = href; }, 220);
  });
})();
</script>
